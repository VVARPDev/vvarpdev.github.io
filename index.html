<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Unity WebGL Player | VVARP_card</title>
    <link rel="stylesheet" href="TemplateData/style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050507;
            --text-white: #ffffff;
            --text-dim: #8b949e;
            --cyan: #00e5ff;
            --magenta: #ff007f;
        }

        html {
            height: -webkit-fill-available;
        }
        
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            width: 100vw;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-white);
        }

        /* Общие стили для всех модальных окон */
        .ctaDiv {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            background: rgba(5, 5, 7, 0.85);
            backdrop-filter: blur(10px);
            z-index: 99;
        }

        /* Контейнеры внутри окон в стиле HUD */
        .hud-container {
            position: relative;
            background-color: rgba(10, 10, 15, 0.9);
            border: 1px solid rgba(0, 229, 255, 0.2);
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
            color: var(--text-white);
            text-align: center;
            max-width: 85vw;
        }

        /* Стилизация всех кнопок под неон */
        button {
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.1);
            margin: 10px;
        }

        button:hover {
            background-color: var(--cyan);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--cyan);
            font-weight: bold;
        }

        /* Выпадающий список камер */
        select {
            background: #0d0d13;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-white);
            font-family: 'JetBrains Mono', monospace;
            padding: 10px;
            margin-bottom: 20px;
            outline: none;
        }
        
        select:focus {
            border-color: var(--cyan);
        }

        p {
            line-height: 1.6;
            letter-spacing: 0.5px;
            font-size: 0.9rem;
        }

        /* Специфические фиксы для окна ошибки */
        #errorDiv {
            background: #0f0505;
            border-top: 2px solid var(--magenta);
        }
        #errorDiv p {
            color: #ff4a4a;
        }

        /* Перебиваем дефолтный белый фон для скришнота */
        .screenshot-box {
            background-color: #0d0d13 !important;
            border: 1px solid var(--cyan);
        }
    </style>
</head>
<body>
    <imagetarget id='bear' src='targets/bear.png'></imagetarget>
    <imagetarget id='bfly' src='targets/bfly.png'></imagetarget>
    <imagetarget id='flower' src='targets/flower.png'></imagetarget>
    <imagetarget id='lady' src='targets/lady.png'></imagetarget>
    <imagetarget id='reel' src='targets/reel.png'></imagetarget>
    <imagetarget id='rmn' src='targets/rmn.png'></imagetarget>
    <imagetarget id='Tracker' src='targets/Front.png'></imagetarget>
    <imagetarget id='Front' src='targets/Front.png'></imagetarget>

    <video id="webcam-video" muted autoplay playsinline style="width:1px;position:absolute"></video>
    <canvas id="video-canvas" style="width:100%; height:100%; object-fit:cover; position:absolute"></canvas>
    
    <div id="startARDiv" class="ctaDiv">
        <div class="hud-container">
            <div style="font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; color: var(--cyan);">[ СИСТЕМА AR ]</div>
            <select id="chooseCamSel" style="display: none;" onchange="SelectCam()"></select>
            <p style="width:60vw; margin: 0 auto 20px auto;">Для работы дополненной реальности требуется доступ к камере вашего устройства.</p>
            <button id="startARButton" onclick="StartAR()" style="display:none">Разрешить доступ</button>
        </div>
    </div>
    
    <div id="screenshotDiv" style="display: none;" class="ctaDiv">
        <div class="hud-container screenshot-box">
            <img id="screenshotImg" src="" alt="screenshot" style="width:80vw; height:80vh; border: 1px solid rgba(255,255,255,0.05); object-fit: contain;">
            <button onclick="document.getElementById('screenshotDiv').style.display = 'none';" style="position:absolute; right:10px; top:-50px">Закрыть</button>
        </div>
    </div>
    
    <div id="confirmUrlDiv" style="display: none;" class="ctaDiv">
        <div class="hud-container" style="width: 80vw; display:flex; flex-direction: column; align-items: center;">
            <p id="confirmUrlText" style="text-align: center; width:80%; overflow: hidden; text-overflow: ellipsis; margin-bottom: 20px;">Вы уверены, что хотите перейти на сайт url.com?</p>
            <div>
                <button onclick="window.open(newUrlString, '_blank').focus(); document.getElementById('confirmUrlDiv').style.display = 'none'">Перейти</button>
                <button onclick="document.getElementById('confirmUrlDiv').style.display = 'none'">Назад</button>
            </div>
        </div>
    </div>
    
    <div id="errorDiv" class="ctaDiv" style="display: none;">
        <div class="hud-container" style="border-color: var(--magenta);">
            <div style="font-size: 1.2rem; font-weight: bold; color: var(--magenta); margin-bottom: 10px;">Ошибка Системы</div>
            <p id="errorText" style="width:60vw;"></p>
        </div>
    </div>
    
    <div id="unity-container" class="unity-mobile">
        <canvas id="unity-canvas" style="width: 100%; height: 100%; background: #0000; z-index: -99"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
        <canvas id="video-canvas"></canvas>
    </div>
    
    <script src="arcamera.js" type="text/javascript"></script>
    <script src="itracker.js" type="text/javascript"></script>
    <script src="Build/vvarpdev.github.io.loader.js"></script>
    <script>
            var initialize = async() =>{
                var unityCanvas = document.querySelector("#unity-canvas");
                var videoCanvas = document.querySelector("#video-canvas");
                window.arCamera = new ARCamera(unityCanvas, videoCanvas);
                window.iTracker = new ImageTracker(arCamera);
                try{
                    await window.iTracker.initialize();
                    console.log("ImageTracker initialized!");
                }
                catch{
                    console.error("Failed to initialize ImageTracker. Are you missing opencv.js? " + error);
                    ShowError("Не удалось инициализировать систему.");
                    return;
                }
                
                await LoadWebcams();
                document.getElementById("startARButton").style.display = "block";
            }
            initialize();
            var container = document.querySelector("#unity-container");
            var canvas = document.querySelector("#unity-canvas");
            var loadingBar = document.querySelector("#unity-loading-bar");
            var progressBarFull = document.querySelector("#unity-progress-bar-full");
            function StartAR() {
                canvas.style.width = window.innerWidth + "px";
                canvas.style.height = window.innerHeight + "px";
                
                document.getElementById("startARDiv").style.display = "none";
                createUnityInstance(document.querySelector("#unity-canvas"), {
                    dataUrl: "Build/vvarpdev.github.io.data",
                    frameworkUrl: "Build/vvarpdev.github.io.framework.js",
                    codeUrl: "Build/vvarpdev.github.io.wasm",
                    streamingAssetsUrl: "StreamingAssets",
                    companyName: "DefaultCompany",
                    productName: "VVARP_card",
                    productVersion: "0.1.0",
                    },
                    (progress) => {
                        progressBarFull.style.width = 100 * progress + "%";
                    }
                ).then((unityInstance) => {
                    window.unityInstance = unityInstance;
                    RequestWebcam();
                    loadingBar.style.display = "none";
                });
                loadingBar.style.display = "block";
            }
            window.unityFacingMode = "environment"
            window.WEBCAM_SETTINGS = {
                video: {
                    facingMode: unityFacingMode,
                },
                audio: false
            };
            window.requestingForPermissions = false;
            async function RequestWebcam(){
                window.requestingForPermissions = true;
                try{
                    window.webcamStream = await navigator.mediaDevices.getUserMedia(window.WEBCAM_SETTINGS);
                    console.log("Webcam access granted");
                    requestingForPermissions = false;
                }
                catch (err) {
                    console.error("getUserMedia error - " , err);
                    ShowError("Не удалось запустить. В доступе к камере отказано.");
                    window.requestingForPermissions = false;
                }            
            }
            async function StartWebcam(){
                console.log("StartWebcam")
                while (window.requestingForPermissions) {
                    console.log("Waiting for permissions...");
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
                console.log("Got Permissions");
                if(window.webcamStream)
                {
                    const video = document.querySelector("#webcam-video");
                    video.srcObject = webcamStream;
                    try {
                        await arCamera.startWebcam(video);
                        console.log("Webcam started successfully");
                        window.unityInstance.SendMessage('ARCamera', 'OnStartWebcamSuccess');
                    }
                    catch(err){
                        console.error("Webcam failed to start - ", err);
                        window.unityInstance.SendMessage('ARCamera', 'OnStartWebcamFail');
                    }   
                }
                else{
                    console.error("Webcam failed to start - permission not yet granted");
                    window.unityInstance.SendMessage('ARCamera', 'OnStartWebcamFail');
                }  
            }
            async function LoadWebcams(){
                let camDevices = [];
                let devices = await navigator.mediaDevices.enumerateDevices();
                var ctr = 0;
                devices.forEach(mediaDevice => {
                    if (mediaDevice.kind === 'videoinput') {
                        if(window.unityFacingMode == 'environment' && !mediaDevice.label.includes('facing front')){
                            camDevices.push(mediaDevice);
                        }
                        else if(window.unityFacingMode == 'user' && mediaDevice.label.includes('facing front')){
                            camDevices.push(mediaDevice);
                        }
                        else{
                            camDevices.push(mediaDevice);
                        }   
                        ctr++;
                    }
                });
                var select = document.getElementById("chooseCamSel");
                select.style.display = "block";
                var count = 0;
                camDevices = camDevices.reverse();
                camDevices.forEach(mediaDevice => {
                    const option = document.createElement('option');
                    option.value = mediaDevice.deviceId;
                    let label = `Камера ${count}`;
                    if (mediaDevice.label) {
                        label = mediaDevice.label
                    }
                    const textNode = document.createTextNode(label);
                    option.appendChild(textNode);
                    select.appendChild(option);
                    count++;
                });
                iTracker.WEBCAM_NAME = select.options[select.selectedIndex].innerHTML;
            }
            function SelectCam(){
                var select = document.getElementById("chooseCamSel");
                window.deviceId = select.value;
                window.WEBCAM_SETTINGS.video['deviceId'] = deviceId;
                iTracker.WEBCAM_NAME = select.options[select.selectedIndex].innerHTML;
            }
            async function FlipCam(){
                arCamera.stopWebcam();
                window.WEBCAM_SETTINGS.video.deviceId = '';
                if(window.WEBCAM_SETTINGS.video.facingMode == 'user'){
                    window.WEBCAM_SETTINGS.video.facingMode = 'environment';
                    arCamera.setFlipped(false);
                }
                else{
                    window.WEBCAM_SETTINGS.video.facingMode = 'user';
                    arCamera.setFlipped(true);
                }
                window.webcamStream = await navigator.mediaDevices.getUserMedia(window.WEBCAM_SETTINGS);
                const video = document.querySelector("#webcam-video");
                video.srcObject = webcamStream;
                await arCamera.startWebcam(video);
            }
            function ShowError(error){
                document.getElementById("errorDiv").style.display = "flex";
                document.getElementById("errorText").innerHTML = error;
            }
            function ShowScreenshot(dataUrl){
                document.getElementById("screenshotDiv").style.display = "flex";
                document.getElementById("screenshotImg").src = dataUrl;
                document.getElementById("screenshotImg").style.width = "80vw";
                document.getElementById("screenshotImg").style.height = 80 / window.innerWidth * window.innerHeight + "vw";
            }
            function ShowConfirmUrl(url){
                document.getElementById("confirmUrlDiv").style.display = "flex";
                window.newUrlString = url;
                document.getElementById("confirmUrlText").innerText = "Вы уверены, что хотите перейти на " + url;                
            }
            window.ITRACKER_GLOBALS = {
                INTERNAL_SMOOTHFACTOR_POS: .075,
            }
    </script>
</body>
</html>
